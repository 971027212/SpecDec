  methods:
    - target_only
    - linear
    - tree_stop_wait
    - specedge_pipeline
  output_dir: experiments/3090_a100_specedge_pipeline_multidraft_smoke/latest
models:
  draft: /home/chajiahao/data/hf_models/Qwen3-1.7B
target:
  url: http://172.16.11.62:8010
draft:
  device: cuda:0
  torch_dtype: fp16
