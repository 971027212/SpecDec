data:
  prompt: 介绍一下 speculative decoding
  sample_prompts: data/sample_prompts_mixed.jsonl
  sample_count: 8
  use_sample_prompts: true

generation:
  max_new_tokens: 8

tree:
  max_depth: 8
  branch_width: 8
  max_budget: 20
  max_verify_batch_items: 8

pipeline:
  min_depth: 1
  max_depth: 8
  proactive_depth: 8

specedge:
  official: true

dip_sd:
  solver: paper_milp_or_dinkelbach
  min_batch_count: 2
  max_batch_count: 0
  initial_draft_length: 7
  max_draft_length: 8
  alpha: 0.78
  comm_latency_ms: 3.0
  draft_c: 4.0305e-11
  draft_beta: 33.8151
  verify_c: 1.2077e-11
  verify_beta: 95.1074
  memory_cap_bytes: 8.0e10
  plan_cache_enabled: true
  steady_state_enabled: true

sled:
  strict: true
  batch_size: 8
  max_speculation_tokens: 8
  confidence_threshold: 0.5
  async:
    proactive_tokens: 8
  static_queue:
    enabled: true
    pad_to_max_length: true

transport:
  mode: observe

plots:
  formats: png,svg
  disabled: false
