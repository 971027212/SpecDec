data:
  prompt: 介绍一下 speculative decoding
  sample_prompts: data/sample_prompts_heldout.jsonl
  sample_count: 8
  use_sample_prompts: true
  split:
    tuning_sample_prompts: data/sample_prompts_mixed.jsonl
    heldout_sample_prompts: data/sample_prompts_heldout.jsonl
    heldout_request_count: 8
generation:
  max_new_tokens: 8
tree:
  max_depth: 4
  branch_width: 8
  max_budget: 20
  max_verify_batch_items: 8
pipeline:
  min_depth: 1
  max_depth: 8
  proactive_depth: 8
specedge:
  official: true
dip_sd:
  solver: offline_table
  no_online_solver: true
  no_online_solver_fallback: offline_heuristic
  offline_plan_table_file: /home/chajiahao/data/specDec/experiments/four_method_best_time_distribution/latest/runs/rc8_dw8_dlocked_mt8_observe/dip_sd/dip_sd_offline_plan_table.json
  min_batch_count: 2
  max_batch_count: 0
  initial_draft_length: 4
  max_draft_length: 4
  alpha: 0.78
  comm_latency_ms: 3.0
  draft_c: 4.0305e-11
  draft_beta: 33.8151
  verify_c: 1.2077e-11
  verify_beta: 95.1074
  memory_cap_bytes: 8.0e10
  plan_cache_enabled: true
  steady_state_enabled: true
  worker_assignment_strategy: latency_first
  prefetch_sticky_worker_enabled: true
  use_measured_worker_latency: true
  adaptive_draft_length_enabled: true
  min_draft_length: 2
  adaptive_length_target_acceptance: 0.78
  adaptive_length_min_factor: 0.35
  ready_aware_rebatch_enabled: true
  ready_aware_rebatch_min_spread_ms: 5.0
  prefetch_use_source_budget_floor: false
  calibration_enabled: false
sled:
  strict: true
  batch_size: 8
  max_speculation_tokens: 4
  confidence_threshold: 0.6
  async:
    proactive_tokens: 8
  static_queue:
    enabled: true
    pad_to_max_length: true
transport:
  mode: observe
plots:
  formats: png,svg
  disabled: false
